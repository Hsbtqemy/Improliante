# /etc/nginx/sites-available/improliante  (exemple)
#
# Reverse proxy Nginx → Gunicorn (socket Unix, cf. asso.service) + service des
# fichiers statiques, médias publics et médias PRIVÉS.
#
# Installation :
#   sudo cp nginx-improliante.conf /etc/nginx/sites-available/improliante
#   sudo ln -s /etc/nginx/sites-available/improliante /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   # puis certbot pour le TLS : sudo certbot --nginx -d improliante.example
#
# Chemins alignés sur asso.service (WorkingDirectory=/srv/asso/app).

upstream improliante_gunicorn {
    server unix:/srv/asso/run/gunicorn.sock;
}

server {
    listen 80;
    server_name improliante.example www.improliante.example;
    # Certbot injecte la redirection 80→443 et la configuration TLS ici.

    # Taille max des uploads (documents, affiches). Ajuster au besoin.
    client_max_body_size 25m;

    # Fichiers statiques collectés (collectstatic → STATIC_ROOT).
    location /static/ {
        alias /srv/asso/app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Médias PUBLICS uniquement (MEDIA_ROOT). Ne JAMAIS y déposer de fichier
    # privé : ce dossier est servi directement, sans contrôle d'accès.
    location /media/ {
        alias /srv/asso/app/media/;
        expires 7d;
    }

    # Médias PRIVÉS (MEDIA_PRIVE_ROOT). `internal` = inaccessible directement
    # par le client : seule une réponse Django portant l'en-tête
    #   X-Accel-Redirect: /media-prive/<chemin>
    # (émise APRÈS contrôle des droits, cf. apps.common.fichiers) déclenche le
    # service du fichier. Le préfixe doit correspondre à settings.X_ACCEL_PREFIXE.
    location /media-prive/ {
        internal;
        alias /srv/asso/app/media_prive/;
    }

    location / {
        proxy_pass http://improliante_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Requis par SECURE_PROXY_SSL_HEADER côté Django (détection HTTPS).
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Côté application (app.env), activer le mode X-Accel en production :
#   DJANGO_X_ACCEL=1
#   DJANGO_X_ACCEL_PREFIXE=/media-prive/
#   DJANGO_MEDIA_PRIVE_ROOT=/srv/asso/app/media_prive
# (UTILISER_X_ACCEL vaut déjà « not DEBUG » par défaut : actif en prod.)
