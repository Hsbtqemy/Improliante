{% extends "base.html" %}

{% block title %}Spectacles &amp; projets — L'Improliante{% endblock %}

{% block contenu %}
  <h1>Spectacles &amp; projets</h1>

  <form method="get" class="filtres" aria-label="Filtrer les spectacles">
    <div class="filtres__champ">
      <label for="filtre-statut">Statut du projet</label>
      <select name="statut" id="filtre-statut" onchange="this.form.submit()">
        <option value="">Tous</option>
        {% for valeur, libelle in statuts %}
          <option value="{{ valeur }}" {% if valeur == statut_actif %}selected{% endif %}>
            {{ libelle }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="filtres__champ">
      <label for="filtre-portage">Portage</label>
      <select name="portage" id="filtre-portage" onchange="this.form.submit()">
        <option value="">Tous</option>
        {% for valeur, libelle in portages %}
          <option value="{{ valeur }}" {% if valeur == portage_actif %}selected{% endif %}>
            {{ libelle }}
          </option>
        {% endfor %}
      </select>
    </div>

    {# Bouton toujours visible : contrôle explicite (sans JS, et pour éviter une
       soumission-surprise au clavier — WCAG 3.2.2). Avec JS, les <select>
       ci-dessus déclenchent aussi le filtrage à la volée. #}
    <button type="submit" class="lien-bouton">Filtrer</button>
  </form>

  {% if spectacles %}
    <ul class="cartes">
      {% for spectacle in spectacles %}
        {% include "vitrine/_carte_spectacle.html" %}
      {% endfor %}
    </ul>
  {% else %}
    <p>Aucun spectacle ne correspond à ces critères.</p>
  {% endif %}
{% endblock %}
